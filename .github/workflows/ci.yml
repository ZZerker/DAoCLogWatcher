name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Run tests on every push and PR ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Install xvfb
        run: sudo apt-get update -y && sudo apt-get install -y xvfb

      - name: Test
        # RUN TESTS IN A VIRTUAL DISPLAY TO PREVENT X11 CRASHES ON THE CI RUNNER
        run: xvfb-run dotnet test DAoCLogWatcher.Tests/DAoCLogWatcher.Tests.csproj --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results.zip
          path: '**/*.trx'

  # ── Build Flatpak bundle (only on version tags) ──────────────────────────────
  flatpak:
    name: Flatpak
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Flatpak tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder xvfb
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-24.08

      - name: Install Flatpak runtime
        run: |
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Publish linux-x64 for Flatpak
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish DAoCLogWatcher.UI/DAoCLogWatcher.UI.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:Version="$VERSION" \
            -o publish/flatpak

      - name: Inject Release Tag and Date into Metainfo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_DATE=$(date +'%Y-%m-%d')
          sed -i "s/__VERSION__/$VERSION/g" flatpak/io.github.zzerker.DAoCLogWatcher.metainfo.xml
          sed -i "s/__DATE__/$CURRENT_DATE/g" flatpak/io.github.zzerker.DAoCLogWatcher.metainfo.xml

      - name: Build Flatpak
        run: |
          xvfb-run --auto-servernum flatpak-builder \
            --user \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak/io.github.zzerker.DAoCLogWatcher.yml

      - name: Bundle Flatpak
        run: flatpak build-bundle flatpak-repo DAoCLogWatcher.flatpak io.github.zzerker.DAoCLogWatcher

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAoCLogWatcher.flatpak
          path: DAoCLogWatcher.flatpak

  # ── Create GitHub Release and attach Flatpak ────────────────────────────────
  release:
    name: Create Release
    needs: [flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: DAoCLogWatcher.flatpak

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DAoCLogWatcher.flatpak
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
