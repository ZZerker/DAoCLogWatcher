name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: {}

jobs:
  # ── Run tests on every push and PR ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Install xvfb
        run: sudo apt-get update -y && sudo apt-get install -y xvfb

      - name: Test
        run: xvfb-run dotnet test DAoCLogWatcher.Tests/DAoCLogWatcher.Tests.csproj --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results.zip
          path: '**/*.trx'

  # ── Publish self-contained binaries (only on version tags) ──────────────────
  publish:
    name: Publish (${{ matrix.rid }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - rid: win-x64
            framework: net10.0-windows10.0.17763
            artifact: DAoCLogWatcher-win-x64.zip
            package_cmd: zip -r ../../DAoCLogWatcher-win-x64.zip .
          - rid: linux-x64
            framework: net10.0
            artifact: DAoCLogWatcher-linux-x64.tar.gz
            package_cmd: tar czf ../../DAoCLogWatcher-linux-x64.tar.gz .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate icon2.ico
        run: |
          sudo apt-get install -y librsvg2-bin imagemagick
          rsvg-convert -w 256 -h 256 -o /tmp/icon2.png DAoCLogWatcher.UI/Assets/icon2.svg
          convert /tmp/icon2.png -define icon:auto-resize="256,128,64,48,32,16" DAoCLogWatcher.UI/Assets/icon2.ico

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish DAoCLogWatcher.UI/DAoCLogWatcher.UI.csproj \
            -c Release \
            -f ${{ matrix.framework }} \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="$VERSION" \
            -o publish/${{ matrix.rid }}

      - name: Package
        run: cd publish/${{ matrix.rid }} && ${{ matrix.package_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Build Flatpak bundle (only on version tags) ──────────────────────────────
  flatpak:
    name: Flatpak
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Flatpak tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder xvfb
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-24.08

      - name: Install Flatpak runtime
        run: |
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Publish linux-x64 for Flatpak
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish DAoCLogWatcher.UI/DAoCLogWatcher.UI.csproj \
            -c Release \
            -f net10.0 \
            -r linux-x64 \
            --self-contained true \
            -p:Flatpak=true \
            -p:Version="$VERSION" \
            -o publish/flatpak

      - name: Inject Release Tag and Date into Metainfo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_DATE=$(date +'%Y-%m-%d')
          sed -i "s/__VERSION__/$VERSION/g" flatpak/io.github.zzerker.DAoCLogWatcher.metainfo.xml
          sed -i "s/__DATE__/$CURRENT_DATE/g" flatpak/io.github.zzerker.DAoCLogWatcher.metainfo.xml

      - name: Build Flatpak
        run: |
          xvfb-run --auto-servernum flatpak-builder \
            --user \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak/io.github.zzerker.DAoCLogWatcher.yml

      - name: Bundle Flatpak
        run: flatpak build-bundle flatpak-repo DAoCLogWatcher.flatpak io.github.zzerker.DAoCLogWatcher

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAoCLogWatcher.flatpak
          path: DAoCLogWatcher.flatpak

  # ── Build AppImage via Velopack (only on version tags) ───────────────────────
  appimage:
    name: AppImage (Velopack)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Build inside an Ubuntu 22.04 container: a self-contained publish still links the
    # host glibc, so building on the oldest supported base (glibc 2.35) keeps the
    # AppImage runnable on Ubuntu 22.04 / Debian 12 / Mint 21 era distros. A container
    # is used instead of the ubuntu-22.04 runner label because that label starts
    # brownouts 2026-09-17 and is retired 2027-04-17.
    container: ubuntu:22.04
    permissions:
      contents: read

    steps:
      # curl/ca-certificates: tool/runtime downloads; librsvg2-bin: icon rasterizing;
      # libicu70: .NET runtime; file/desktop-file-utils/squashfs-tools/zsync: used by the
      # appimagetool that Velopack (vpk) invokes to assemble the AppImage.
      - name: Install build prerequisites
        run: |
          apt-get update -y
          apt-get install -y curl ca-certificates git librsvg2-bin libicu70 file desktop-file-utils squashfs-tools zsync

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build AppImage (Velopack vpk)
        env:
          VERSION: ${{ github.ref_name }}
          OUTPUT_DIR: ${{ github.workspace }}/releases/linux
          # appimagetool needs FUSE otherwise; extract-and-run avoids it in CI.
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          # Strip the leading "v" from the tag (v0.5.0 -> 0.5.0).
          export VERSION="${VERSION#v}"
          ./appimage/build-appimage.sh

      # The whole release folder: DAoCLogWatcher.AppImage plus the Velopack update metadata
      # (releases.linux.json, *-linux-full.nupkg, RELEASES-linux) the in-app updater reads.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-linux
          path: releases/linux/

  # ── Build Velopack Windows installer (only on version tags) ─────────────────
  velopack-windows:
    name: Velopack Windows
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Generate icon2.ico
        run: |
          magick -background none DAoCLogWatcher.UI/Assets/icon2.svg -resize 256x256 icon2.png
          magick icon2.png -define icon:auto-resize="256,128,64,48,32,16" DAoCLogWatcher.UI/Assets/icon2.ico

      # Velopack rejects anything that is not 3-part SemVer2, so a "v0.5" tag must become "0.5.0".
      - name: Resolve pack version
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $core, $suffix = $tag -split '-', 2
          $parts = $core -split '\.'
          while ($parts.Count -lt 3) { $parts += '0' }
          $version = ($parts[0..2] -join '.')
          if ($suffix) { $version = "$version-$suffix" }
          "PACK_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Pack version: $version"

      - name: Publish win-x64 for Velopack
        run: |
          dotnet publish DAoCLogWatcher.UI/DAoCLogWatcher.UI.csproj `
            -c Release -f net10.0-windows10.0.17763 -r win-x64 --self-contained true `
            -p:Version="$env:PACK_VERSION" `
            -o publish/win-x64

      - name: Pack with Velopack
        run: |
          vpk pack `
            --packId DAoCLogWatcher `
            --packVersion $env:PACK_VERSION `
            --packDir publish/win-x64 `
            --mainExe DAoCLogWatcher.UI.exe `
            --icon DAoCLogWatcher.UI/Assets/icon2.ico `
            --outputDir releases/win

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: velopack-win
          path: releases/win/

  # ── Create GitHub Release and attach binaries ────────────────────────────────
  release:
    name: Create Release
    needs: [publish, flatpak, appimage, velopack-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download standard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "DAoCLogWatcher*"
          merge-multiple: true

      - name: Download Velopack Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: velopack-win
          path: velopack-win

      - name: Download Velopack Linux (AppImage) artifacts
        uses: actions/download-artifact@v4
        with:
          name: velopack-linux
          path: velopack-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DAoCLogWatcher-win-x64.zip
            DAoCLogWatcher-linux-x64.tar.gz
            DAoCLogWatcher.flatpak
            velopack-win/*
            velopack-linux/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
