name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Run tests on every push and PR ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test DAoCLogWatcher.Tests/DAoCLogWatcher.Tests.csproj --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results.zip
          path: '**/*.trx'

  # ── Publish self-contained binaries (only on version tags) ──────────────────
  publish:
    name: Publish (${{ matrix.rid }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: DAoCLogWatcher-win-x64.zip
            package_cmd: zip -r ../../DAoCLogWatcher-win-x64.zip .
          - rid: linux-x64
            artifact: DAoCLogWatcher-linux-x64.tar.gz
            package_cmd: tar czf ../../DAoCLogWatcher-linux-x64.tar.gz .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish DAoCLogWatcher.UI/DAoCLogWatcher.UI.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="$VERSION" \
            -o publish/${{ matrix.rid }}

      - name: Package
        run: cd publish/${{ matrix.rid }} && ${{ matrix.package_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Create GitHub Release and attach binaries ────────────────────────────────
  # ── Build Flatpak bundle (only on version tags) ──────────────────────────────
  flatpak:
    name: Flatpak
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Flatpak tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Publish linux-x64 for Flatpak
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish DAoCLogWatcher.UI/DAoCLogWatcher.UI.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:Version="$VERSION" \
            -o publish/flatpak

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: DAoCLogWatcher.flatpak
          manifest-path: flatpak/io.github.zzerker.DAoCLogWatcher.yml
          cache-key: flatpak-builder-${{ github.sha }}

  # ── Create GitHub Release and attach binaries ────────────────────────────────
  release:
    name: Create Release
    needs: [publish, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DAoCLogWatcher-win-x64.zip
            DAoCLogWatcher-linux-x64.tar.gz
            DAoCLogWatcher.flatpak
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
