app-id: io.github.zzerker.DAoCLogWatcher
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: DAoCLogWatcher.UI

finish-args:
  - --share=ipc
  - --socket=fallback-x11   # X11 when not on Wayland
  - --socket=wayland
  - --device=dri             # GPU acceleration for Avalonia rendering
  - --filesystem=home        # read chat.log and Eden profile folder

modules:
  - name: daoc-log-watcher
    buildsystem: simple
    build-commands:
      # Install all app files into /app/lib so the exe can find its assemblies
      - install -Dm755 -d /app/lib/daoclogwatcher
      - cp -a app/. /app/lib/daoclogwatcher/
      - chmod +x /app/lib/daoclogwatcher/DAoCLogWatcher.UI
      # Install icon and desktop integration
      - install -Dm644 icon.svg /app/share/icons/hicolor/scalable/apps/io.github.zzerker.DAoCLogWatcher.svg
      - install -Dm644 io.github.zzerker.DAoCLogWatcher.desktop /app/share/applications/io.github.zzerker.DAoCLogWatcher.desktop
      # Install the generated launcher script to /app/bin (on PATH)
      - install -Dm755 launcher.sh /app/bin/DAoCLogWatcher.UI
    sources:
      # Pre-built publish output copied here by the CI publish step
      - type: dir
        path: ../publish/flatpak
        dest: app
      # SVG icon for desktop integration (not available as standalone file in publish output)
      - type: file
        path: ../DAoCLogWatcher.UI/Assets/icon2.svg
        dest-filename: icon.svg
      # XDG desktop entry
      - type: file
        path: io.github.zzerker.DAoCLogWatcher.desktop
      - type: file
        path: io.github.zzerker.DAoCLogWatcher.svg
      - type: file
        path: io.github.zzerker.DAoCLogWatcher.metainfo.xml
      # Launcher wrapper so .NET resolves assemblies from /app/lib/daoclogwatcher/
      - type: script
        dest-filename: launcher.sh
        commands:
          # On a Wayland session, unset DISPLAY so Avalonia doesn't attempt X11
          # (fallback-x11 can leave DISPLAY set even when XWayland is unavailable)
          - '[ -n "$WAYLAND_DISPLAY" ] && unset DISPLAY'
          - exec /app/lib/daoclogwatcher/DAoCLogWatcher.UI "$@"
